<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Team Headshots — Burlington Consult</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; background: #040A0F; color: #F7F7F5; padding: 40px 20px; }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  h1 span { color: #0D9488; }
  .sub { font-size: 12px; color: #807F7A; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; }
  .card { text-align: center; }
  .card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #0D9488; }
  .card .name { font-size: 12px; font-weight: 600; margin-top: 8px; color: #F7F7F5; }
  .card .url { font-size: 10px; color: #0D9488; word-break: break-all; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>Burlington<span>●</span> Headshots</h1>
  <p class="sub">Email signature headshots — 180×180px square-cropped JPEGs. Not indexed.</p>
  <div class="grid">
    <div class="card">
      <img src="/headshots/chris.jpg" alt="Chris Ogbodo">
      <div class="name">Chris</div>
      <div class="url">/headshots/chris.jpg</div>
    </div>
    <div class="card">
      <img src="/headshots/nkem.jpg" alt="Nkem Nweke">
      <div class="name">Nkem</div>
      <div class="url">/headshots/nkem.jpg</div>
    </div>
    <div class="card">
      <img src="/headshots/afiong.jpg" alt="Afiong Ibio">
      <div class="name">Afiong</div>
      <div class="url">/headshots/afiong.jpg</div>
    </div>
    <div class="card">
      <img src="/headshots/chisom.jpg" alt="Chisom Chibuike">
      <div class="name">Chisom</div>
      <div class="url">/headshots/chisom.jpg</div>
    </div>
    <div class="card">
      <img src="/headshots/ojima.jpg" alt="Stanley Ojima">
      <div class="name">Ojima</div>
      <div class="url">/headshots/ojima.jpg</div>
    </div>
  </div>
</div>
</body>
</html>
